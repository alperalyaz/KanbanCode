version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
      - /landing
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 0
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 0
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
