name: Release

# KanbanCode Windows release: NSIS installer (.exe) + Microsoft Store package (.appx).
# Trigger from Actions → Release → Run workflow. No local Windows toolchain required.
#
# Version comes from package.json automatically. Leave release_tag empty unless you
# intentionally want a different tag.
#
# Runtime binaries are downloaded from the public upstream tag pinned in
# runtime.lock.json (not from this fork's release tag).

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional override. Leave empty to use package.json (e.g. 2.1.5 → v2.1.5)
        required: false
        type: string
        default: ''
      publish_release:
        description: Publish the release after assets are uploaded (otherwise leave as draft)
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-windows
  cancel-in-progress: false

env:
  PUBLISH_RELEASE: ${{ inputs.publish_release }}

jobs:
  release-win:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release tag from package.json
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          INPUT_TAG="${{ inputs.release_tag }}"
          INPUT_TAG="$(echo "$INPUT_TAG" | xargs)"
          if [ -n "$INPUT_TAG" ]; then
            case "$INPUT_TAG" in
              v[0-9]*) TAG="$INPUT_TAG" ;;
              [0-9]*) TAG="v$INPUT_TAG" ;;
              *)
                echo "release_tag must look like v2.1.5 (or leave empty), got '$INPUT_TAG'" >&2
                exit 1
                ;;
            esac
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using release tag $TAG (version $VERSION)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore pnpm node-gyp executable bit
        shell: bash
        run: |
          PNPM_STORE="$(pnpm store path)"
          PNPM_BIN_DIR="$(dirname "$(command -v pnpm)")"
          for path in "$PNPM_STORE" "${PNPM_HOME:-}" "$PNPM_BIN_DIR"; do
            if [ -d "$path" ]; then
              find "$path" -path '*/node-gyp/gyp/gyp_main.py' -exec chmod +x {} \; 2>/dev/null || true
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package.json version with release tag
        shell: bash
        run: |
          set -euo pipefail
          CURRENT="$(node -p "require('./package.json').version")"
          TARGET="${{ steps.meta.outputs.version }}"
          if [ "$CURRENT" != "$TARGET" ]; then
            pnpm pkg set version="$TARGET"
            echo "Updated package.json version $CURRENT → $TARGET"
          else
            echo "package.json already at $TARGET"
          fi

      - name: Create draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          existing_is_draft="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null || true)"
          if [ -n "$existing_is_draft" ]; then
            if [ "${PUBLISH_RELEASE}" != "true" ] && [ "$existing_is_draft" != "true" ]; then
              echo "Release $TAG already exists and is not a draft; refusing to overwrite it from draft mode." >&2
              exit 1
            fi
            echo "Release $TAG already exists, skipping creation"
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "KanbanCode ${{ steps.meta.outputs.version }}" \
            --generate-notes \
            --draft=true

      - name: Stage bundled runtime (Windows)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Always use the tag pinned in runtime.lock.json (public upstream assets).
          # Do NOT pass this fork's app release tag — those runtime files live on
          # 777genius/agent-teams-ai, not on alperalyaz/KanbanCode.
          node ./scripts/stage-runtime.mjs --platform win32-x64

      - name: Build app
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: pnpm build

      - name: Verify packaged inputs
        shell: bash
        run: |
          set -euo pipefail
          test -f dist-electron/main/index.cjs
          test -f dist-electron/preload/index.js
          test -f out/renderer/index.html
          test -f mcp-server/dist/index.js
          test -f resources/runtime/VERSION
          test -f build/appx/StoreLogo.png
          test -f build/appx/Square150x150Logo.png
          test -f build/appx/Square44x44Logo.png

      - name: Package Windows (NSIS + appx)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned packages: Partner Center re-signs .appx for Store.
          # NSIS .exe is fine for sideload / GitHub downloads (SmartScreen may warn).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm pack:win --publish never

      - name: Validate packaged bundle
        shell: bash
        run: node ./scripts/electron-builder/verifyBundle.cjs "release/win-unpacked" win32 x64

      - name: List release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release/ || true
          test -n "$(ls release/*.exe 2>/dev/null || true)" || {
            echo "No .exe installer produced" >&2
            exit 1
          }
          test -n "$(ls release/*.appx 2>/dev/null || true)" || {
            echo "No .appx Store package produced" >&2
            exit 1
          }

      - name: Upload build artifacts to Actions
        uses: actions/upload-artifact@v7
        with:
          name: kanbancode-windows-${{ steps.meta.outputs.tag }}
          path: |
            release/*.exe
            release/*.appx
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          for f in release/*.exe release/*.appx release/*.blockmap; do
            [ -f "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1 || \
              (sleep 5 && gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1)
          done

      - name: Publish release
        if: ${{ inputs.publish_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "${{ steps.meta.outputs.tag }}" --repo "${GITHUB_REPOSITORY}" --draft=false --latest

      - name: Keep release as draft
        if: ${{ !inputs.publish_release }}
        shell: bash
        run: echo "Draft release ${{ steps.meta.outputs.tag }} is ready with .exe + .appx. Set publish_release=true next time to publish."
