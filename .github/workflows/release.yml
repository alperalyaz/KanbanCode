name: Release

# KanbanCode Windows release: NSIS installer (.exe) + Microsoft Store package (.appx).
# Trigger from Actions → Release → Run workflow. No local Windows toolchain required.
#
# Runtime binaries are downloaded from the public upstream tag pinned in
# runtime.lock.json (not from this fork's release tag).

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build into a draft, for example v2.1.5
        required: true
        type: string
      publish_release:
        description: Publish the release after assets are uploaded (otherwise leave as draft)
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.release_tag }}
  PUBLISH_RELEASE: ${{ inputs.publish_release }}

jobs:
  release-win:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          case "${RELEASE_TAG:-}" in
            v[0-9]*) ;;
            *)
              echo "release_tag must start with v and include a numeric version, got '${RELEASE_TAG:-<empty>}'" >&2
              exit 1
              ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore pnpm node-gyp executable bit
        shell: bash
        run: |
          PNPM_STORE="$(pnpm store path)"
          PNPM_BIN_DIR="$(dirname "$(command -v pnpm)")"
          for path in "$PNPM_STORE" "${PNPM_HOME:-}" "$PNPM_BIN_DIR"; do
            if [ -d "$path" ]; then
              find "$path" -path '*/node-gyp/gyp/gyp_main.py' -exec chmod +x {} \; 2>/dev/null || true
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from release tag
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          pnpm pkg set version="$VERSION"
          echo "Building KanbanCode $VERSION"

      - name: Create draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          existing_is_draft="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null || true)"
          if [ -n "$existing_is_draft" ]; then
            if [ "${PUBLISH_RELEASE}" != "true" ] && [ "$existing_is_draft" != "true" ]; then
              echo "Release $TAG already exists and is not a draft; refusing to overwrite it from draft mode." >&2
              exit 1
            fi
            echo "Release $TAG already exists, skipping creation"
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "KanbanCode ${TAG#v}" \
            --generate-notes \
            --draft=true

      - name: Stage bundled runtime (Windows)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Always use the tag pinned in runtime.lock.json (public upstream assets).
          # Do NOT pass this fork's app release tag — those runtime files live on
          # 777genius/agent-teams-ai, not on alperalyaz/KanbanCode.
          node ./scripts/stage-runtime.mjs --platform win32-x64

      - name: Build app
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: pnpm build

      - name: Verify packaged inputs
        shell: bash
        run: |
          set -euo pipefail
          test -f dist-electron/main/index.cjs
          test -f dist-electron/preload/index.js
          test -f out/renderer/index.html
          test -f mcp-server/dist/index.js
          test -f resources/runtime/VERSION
          test -f build/appx/StoreLogo.png
          test -f build/appx/Square150x150Logo.png
          test -f build/appx/Square44x44Logo.png

      - name: Package Windows (NSIS + appx)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned packages: Partner Center re-signs .appx for Store.
          # NSIS .exe is fine for sideload / GitHub downloads (SmartScreen may warn).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm pack:win --publish never

      - name: Validate packaged bundle
        shell: bash
        run: node ./scripts/electron-builder/verifyBundle.cjs "release/win-unpacked" win32 x64

      - name: List release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release/ || true
          test -n "$(ls release/*.exe 2>/dev/null || true)" || {
            echo "No .exe installer produced" >&2
            exit 1
          }
          test -n "$(ls release/*.appx 2>/dev/null || true)" || {
            echo "No .appx Store package produced" >&2
            exit 1
          }

      - name: Upload build artifacts to Actions
        uses: actions/upload-artifact@v7
        with:
          name: kanbancode-windows-${{ inputs.release_tag }}
          path: |
            release/*.exe
            release/*.appx
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          for f in release/*.exe release/*.appx release/*.blockmap; do
            [ -f "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1 || \
              (sleep 5 && gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber 2>&1)
          done

      - name: Publish release
        if: ${{ inputs.publish_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false --latest

      - name: Keep release as draft
        if: ${{ !inputs.publish_release }}
        shell: bash
        run: echo "Draft release ${RELEASE_TAG} is ready with .exe + .appx. Set publish_release=true next time to publish."
