<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; font-src 'self' data:; connect-src 'self' data: blob: http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* https:; media-src 'self' data: blob: http: https:; frame-src 'self' http: https:; object-src 'none'; base-uri 'self'; form-action 'none'; worker-src 'self' blob:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <title>KanbanCode</title>
    <style>
      /* Minimal startup splash: logo, name, progress, status. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #111218;
        transition: opacity 0.24s ease-out;
      }
      #splash.splash-exiting {
        opacity: 0;
      }
      #splash-logo {
        margin-bottom: 20px;
      }
      #splash-copy {
        display: flex;
        width: min(88vw, 420px);
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      #splash-text {
        font-family:
          ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: #a1a1aa;
      }
      #splash-loading {
        display: flex;
        width: min(320px, 78vw);
        margin-top: 20px;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #splash-status-row {
        display: flex;
        width: 100%;
        align-items: baseline;
        justify-content: center;
        gap: 4px;
      }
      #splash-status {
        min-height: 12px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: rgba(212, 212, 216, 0.72);
        line-height: 1.25;
        overflow-wrap: anywhere;
      }
      #splash-elapsed::before {
        content: '·';
        margin-right: 4px;
        color: rgba(212, 212, 216, 0.34);
      }
      #splash-elapsed {
        font-family:
          ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
        font-size: 13px;
        font-weight: 500;
        color: rgba(212, 212, 216, 0.5);
        white-space: nowrap;
      }
      #splash-hint {
        width: 100%;
        min-height: 15px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        font-size: 13px;
        color: rgba(212, 212, 216, 0.54);
        line-height: 1.35;
        text-align: center;
      }
      #splash-timeline {
        display: none;
        width: min(320px, 78vw);
        max-height: 58px;
        margin-top: 8px;
        flex-direction: column;
        gap: 6px;
        overflow: hidden;
      }
      #splash.splash-status-error #splash-timeline {
        display: flex;
      }
      .splash-step {
        display: grid;
        grid-template-columns: 8px minmax(0, 1fr) auto;
        align-items: center;
        gap: 9px;
        opacity: 0.56;
      }
      .splash-step.is-current {
        opacity: 1;
      }
      .splash-step-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: rgba(212, 212, 216, 0.42);
      }
      .splash-step.is-current .splash-step-dot {
        background: #a78bfa;
      }
      .splash-step-label,
      .splash-step-time {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        font-size: 13px;
        line-height: 1.25;
      }
      .splash-step-label {
        min-width: 0;
        overflow: hidden;
        color: rgba(212, 212, 216, 0.62);
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .splash-step.is-current .splash-step-label {
        color: rgba(244, 244, 245, 0.86);
      }
      .splash-step-time {
        color: rgba(212, 212, 216, 0.44);
        white-space: nowrap;
      }
      #splash-progress {
        position: relative;
        width: min(240px, 64vw);
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }
      #splash-progress-bar {
        position: absolute;
        inset: 0 auto 0 0;
        width: 38%;
        border-radius: inherit;
        background: linear-gradient(90deg, #818cf8, #c084fc);
        animation: splash-progress 1.2s ease-in-out infinite;
      }
      #splash.splash-status-error #splash-status {
        color: #fca5a5;
      }
      #splash.splash-status-slow #splash-status {
        color: #fde68a;
      }
      #splash.splash-status-error #splash-progress-bar {
        background: #f87171;
        animation: none;
      }
      @keyframes splash-progress {
        0% {
          transform: translateX(-110%);
        }
        55% {
          transform: translateX(90%);
        }
        100% {
          transform: translateX(260%);
        }
      }

      /* Light theme splash overrides */
      :root.light #splash {
        background: #eef1f7;
      }
      :root.light #splash-text {
        color: #52525b;
      }
      :root.light #splash-status {
        color: rgba(63, 63, 70, 0.7);
      }
      :root.light #splash-elapsed,
      :root.light .splash-step-time {
        color: rgba(63, 63, 70, 0.48);
      }
      :root.light #splash-hint,
      :root.light .splash-step-label {
        color: rgba(63, 63, 70, 0.58);
      }
      :root.light .splash-step.is-current .splash-step-label {
        color: rgba(39, 39, 42, 0.82);
      }
      :root.light .splash-step-dot {
        background: rgba(63, 63, 70, 0.34);
      }
      :root.light #splash-progress {
        background: rgba(79, 70, 229, 0.14);
      }
      @media (prefers-reduced-motion: reduce) {
        #splash-progress-bar {
          animation: none !important;
        }
      }
    </style>
    <script>
      // Flash prevention: Apply cached theme before React loads,
      // and keep the elapsed counter ticking until the app takes over.
      (function () {
        function resolveStartupLocale() {
          try {
            var cached = localStorage.getItem('agent-teams-locale-cache');
            if (cached === 'tr' || cached === 'en') {
              return cached;
            }
          } catch (e) {}
          var lang = (navigator.language || 'en').toLowerCase();
          return lang.indexOf('tr') === 0 ? 'tr' : 'en';
        }

        function getInitialSplashMessage(locale) {
          return locale === 'tr' ? 'Çalışma alanı hazırlanıyor...' : 'Preparing workspace...';
        }

        try {
          window.__claudeTeamsSplashStartedAt = performance.now();
          var startupLocale = resolveStartupLocale();
          var splashStatus = document.getElementById('splash-status');
          if (splashStatus) {
            splashStatus.textContent = getInitialSplashMessage(startupLocale);
          }
          document.documentElement.lang = startupLocale;
          window.__claudeTeamsSplashStaticTimer = window.setInterval(function () {
            var elapsed = document.getElementById('splash-elapsed');
            var splash = document.getElementById('splash');
            if (!elapsed || !splash) {
              window.clearInterval(window.__claudeTeamsSplashStaticTimer);
              window.__claudeTeamsSplashStaticTimer = undefined;
              return;
            }
            var startedAt = window.__claudeTeamsSplashStartedAt || performance.now();
            var seconds = Math.max(0, Math.floor((performance.now() - startedAt) / 1000));
            elapsed.textContent = seconds + 's';
          }, 1000);
          var theme =
            localStorage.getItem('agent-teams-theme-cache') ||
            localStorage.getItem('claude-devtools-theme-cache');
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="splash">
      <svg
        id="splash-logo"
        viewBox="0 0 56 56"
        width="72"
        height="72"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <linearGradient id="splash-k-gradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#818cf8" />
            <stop offset="100%" stop-color="#c084fc" />
          </linearGradient>
        </defs>
        <rect width="56" height="56" rx="14" fill="#151620" />
        <path
          d="M20 15 V41 M36 15 L23 28.5 L36 41"
          stroke="url(#splash-k-gradient)"
          stroke-width="5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <div id="splash-copy">
        <div id="splash-text">KanbanCode</div>
        <div id="splash-loading">
          <div id="splash-progress" aria-hidden="true"><div id="splash-progress-bar"></div></div>
          <div id="splash-status-row">
            <div id="splash-status" aria-live="polite">Preparing workspace...</div>
            <div id="splash-elapsed">0s</div>
          </div>
          <div id="splash-hint" aria-live="polite"></div>
        </div>
        <div id="splash-timeline" aria-label="Startup steps"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module">
      import('./main.tsx');
    </script>
  </body>
</html>
